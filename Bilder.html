<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilder Seite</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 50px;
      font-size: 42px;
    }

    .section {
      margin-bottom: 60px;
    }

    .section h2 {
      margin-bottom: 20px;
      font-size: 30px;
      border-left: 6px solid #333;
      padding-left: 12px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      background: #ddd;
      transition: 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <h1>Bilder von dem Raum und der Vorstellung</h1>

  <div class="section">
    <h2>Bilder aus dem Raum</h2>

    <div class="gallery">

      <img src="./Images/Bild Raum 1.png" alt="Image 1">
      <img src="./Images/Bild Raum 2.png" alt="Image 2">
      <img src="./Images/Bild Raum 3.png" alt="Image 3">
      <img src="./Images/Bild Raum 4.png" alt="Image 4">
      <img src="./Images/Bild Raum 5.png" alt="Image 5">
      <img src="./Images/Bild Raum 6.png" alt="Image 6">
      <img src="./Images/Bild Raum 7.png" alt="Image 7">
      <img src="./Images/Bild Raum 8.png" alt="Image 8">
      <img src="./Images/Bild Raum 9.png" alt="Image 9">
      <img src="./Images/Bild Raum 10.png" alt="Image 10">
      <img src="./Images/Bild Raum 11.png" alt="Image 11">
      <img src="./Images/Bild Raum 12.png" alt="Image 12">
      <img src="./Images/Bild Raum 13.png" alt="Image 13">
      <img src="./Images/Bild Raum 14.png" alt="Image 14">
      <img src="./Images/Bild Raum 15.png" alt="Image 15">
      <img src="./Images/Bild Raum 16.png" alt="Image 16">
      <img src="./Images/Bild Raum 17.png" alt="Image 17">
      <img src="./Images/Bild Raum 18.png" alt="Image 18">
      <img src="./Images/Bild Raum 19.png" alt="Image 19">
      <img src="./Images/Bild Raum 20.png" alt="Image 20">
      <img src="./Images/Bild Raum 21.png" alt="Image 21">
      <img src="./Images/Bild Raum 22.png" alt="Image 22">
      <img src="./Images/Bild Raum 23.png" alt="Image 23">
      <img src="./Images/Bild Raum 24.png" alt="Image 24">
      <img src="./Images/Bild Raum 25.png" alt="Image 25">

    </div>
  </div>

  <div class="section">
    <h2>Bilder von der Vorstellung des Raumes</h2>

    <div class="gallery">

      <img src="./Images/2026-04-22 Eva Weyl-1.jpg" alt="Pic 1">
      <img src="./Images/2026-04-22 Eva Weyl-2.jpg" alt="Pic 2">
      <img src="./Images/2026-04-22 Eva Weyl-3.jpg" alt="Pic 3">
      <img src="./Images/2026-04-22 Eva Weyl-4.jpg" alt="Pic 4">
      <img src="./Images/2026-04-22 Eva Weyl-5.jpg" alt="Pic 5">
      <img src="./Images/2026-04-22 Eva Weyl-6.jpg" alt="Pic 6">
      <img src="./Images/2026-04-22 Eva Weyl-7.jpg" alt="Pic 7">
      <img src="./Images/2026-04-22 Eva Weyl-8.jpg" alt="Pic 8">
      <img src="./Images/2026-04-22 Eva Weyl-9.jpg" alt="Pic 9">
      <img src="./Images/2026-04-22 Eva Weyl-10.jpg" alt="Pic 10">

    </div>
  </div>
<div id="lightbox">
  <span id="closeBtn">&times;</span>
  <img id="lightboxImg" src="">
</div>

<style>
  #lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  #lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(255,255,255,0.2);
    animation: zoomIn 0.3s ease;
  }

  #closeBtn {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 50px;
    cursor: pointer;
    font-weight: bold;
  }

  @keyframes zoomIn {
    from {
      transform: scale(0.7);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  .gallery img {
    cursor: pointer;
  }
</style>

<script>
  const images = document.querySelectorAll(".gallery img");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const closeBtn = document.getElementById("closeBtn");

  images.forEach(img => {
    img.addEventListener("click", () => {
      lightbox.style.display = "flex";
      lightboxImg.src = img.src;
    });
  });

  closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
  });

  lightbox.addEventListener("click", (e) => {
    if (e.target !== lightboxImg) {
      lightbox.style.display = "none";
    }
  });
</script>
</body>
</html>

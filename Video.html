<!DOCTYPE html>
<html>
<head>
    <title>Video: Warum sind Zeitzeugen eigentlich wichtig?</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            padding-bottom: 56.25%; 
            height: 0;
            border: 2px solid #555;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="video-container">
    <iframe src="https://youtu.be/o2XNfWfKvRw" 
            title="YouTube video player" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
    </iframe>
</div>

</body>
</html>
